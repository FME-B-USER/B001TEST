<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>庫存管理工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
    padding: 24px;
  }

  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 24px;
    color: #1a202c;
    border-left: 5px solid #4299e1;
    padding-left: 12px;
  }

  .card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    padding: 24px;
    margin-bottom: 24px;
  }

  .card h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: #2b6cb0;
  }

  .form-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 140px;
  }

  label {
    font-size: 0.85rem;
    font-weight: 500;
    color: #4a5568;
  }

  input[type="text"],
  input[type="number"] {
    padding: 8px 12px;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    font-size: 0.95rem;
    font-family: inherit;
    transition: border-color 0.2s;
    outline: none;
  }

  input:focus { border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.15); }

  .btn {
    padding: 9px 22px;
    border: none;
    border-radius: 6px;
    font-size: 0.95rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary   { background: #4299e1; color: #fff; }
  .btn-primary:hover { background: #3182ce; }
  .btn-secondary { background: #e2e8f0; color: #2d3748; }
  .btn-secondary:hover { background: #cbd5e0; }
  .btn-danger  { background: #fc8181; color: #fff; padding: 5px 10px; font-size: 0.8rem; }
  .btn-danger:hover  { background: #e53e3e; }
  .btn-edit    { background: #68d391; color: #1a202c; padding: 5px 10px; font-size: 0.8rem; }
  .btn-edit:hover    { background: #38a169; color: #fff; }
  .btn-in      { background: #4299e1; color: #fff; padding: 5px 10px; font-size: 0.8rem; }
  .btn-in:hover      { background: #2b6cb0; }
  .btn-out     { background: #ed8936; color: #fff; padding: 5px 10px; font-size: 0.8rem; }
  .btn-out:hover     { background: #c05621; }
  .btn-csv     { background: #805ad5; color: #fff; }
  .btn-csv:hover     { background: #6b46c1; }

  /* 庫存不足警示 */
  .alert-box {
    background: #fff5f5;
    border: 1.5px solid #fc8181;
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 24px;
  }
  .alert-box h2 {
    color: #c53030;
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .alert-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .alert-tag {
    background: #fed7d7;
    color: #822727;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .alert-tag span { color: #c53030; }

  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    padding: 8px 12px;
    border: 1px solid #cbd5e0;
    border-radius: 6px;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
  }
  .search-box:focus { border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.15); }

  .stats {
    font-size: 0.85rem;
    color: #718096;
    white-space: nowrap;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.92rem;
  }

  thead th {
    background: #ebf8ff;
    color: #2b6cb0;
    font-weight: 600;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 2px solid #bee3f8;
  }

  tbody tr:nth-child(odd)  { background: #fff; }
  tbody tr:nth-child(even) { background: #f7fafc; }
  tbody tr:hover { background: #ebf8ff; }
  /* 庫存不足列——覆蓋斑馬紋 */
  tbody tr.row-low:nth-child(odd),
  tbody tr.row-low:nth-child(even) { background: #fff5f5; }
  tbody tr.row-low:hover            { background: #fed7d7; }

  tbody td {
    padding: 10px 14px;
    border-bottom: 1px solid #e2e8f0;
    vertical-align: middle;
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .badge-ok      { background: #c6f6d5; color: #276749; }
  .badge-warning { background: #fefcbf; color: #744210; }
  .badge-danger  { background: #fed7d7; color: #822727; }
  .badge-excess  { background: #feebc8; color: #7b341e; }

  .empty-msg {
    text-align: center;
    padding: 40px;
    color: #a0aec0;
    font-size: 0.95rem;
  }

  .action-btns { display: flex; gap: 5px; flex-wrap: wrap; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 12px;
    padding: 28px 28px 20px;
    width: 360px;
    max-width: 94vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 18px; color: #1a202c; }
  .modal .form-group { margin-bottom: 14px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: #2d3748;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.9rem;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    h1 { font-size: 1.3rem; }
    .form-group { min-width: 100%; }
  }
</style>
</head>
<body>

<h1>庫存管理工具</h1>

<!-- 庫存不足警示 -->
<div class="alert-box" id="alert-box" style="display:none">
  <h2>⚠️ 庫存不足警示</h2>
  <div class="alert-tags" id="alert-tags"></div>
</div>

<!-- 新增商品 -->
<div class="card">
  <h2>新增商品</h2>
  <div class="form-row">
    <div class="form-group">
      <label for="inp-name">商品名稱</label>
      <input type="text" id="inp-name" placeholder="例：衛生紙" maxlength="50">
    </div>
    <div class="form-group">
      <label for="inp-qty">目前數量</label>
      <input type="number" id="inp-qty" placeholder="0" min="0">
    </div>
    <div class="form-group">
      <label for="inp-min">最低庫存量</label>
      <input type="number" id="inp-min" placeholder="0" min="0">
    </div>
    <div class="form-group">
      <label for="inp-warehouse">倉別</label>
      <select id="inp-warehouse">
        <option value="大溪倉">大溪倉</option>
        <option value="大肚倉">大肚倉</option>
        <option value="岡山倉">岡山倉</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="addItem()">＋ 新增</button>
  </div>
</div>

<!-- 商品列表 -->
<div class="card">
  <h2>商品庫存列表</h2>
  <div class="toolbar">
    <input class="search-box" type="text" id="search" placeholder="🔍 搜尋商品名稱…" oninput="renderAll()">
    <span class="stats" id="stats"></span>
    <button class="btn btn-csv" onclick="exportCSV()">⬇ 匯出 CSV</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>商品名稱</th>
        <th>倉別</th>
        <th>目前數量</th>
        <th>最低庫存量</th>
        <th>差異數量</th>
        <th>狀態</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty-msg" class="empty-msg" style="display:none">尚無商品，請先新增。</div>
</div>

<!-- 編輯 Modal -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>編輯商品</h3>
    <div class="form-group">
      <label for="edit-name">商品名稱</label>
      <input type="text" id="edit-name" maxlength="50">
    </div>
    <div class="form-group">
      <label for="edit-qty">目前數量</label>
      <input type="number" id="edit-qty" min="0">
    </div>
    <div class="form-group">
      <label for="edit-min">最低庫存量</label>
      <input type="number" id="edit-min" min="0">
    </div>
    <div class="form-group">
      <label for="edit-warehouse">倉別</label>
      <select id="edit-warehouse">
        <option value="大溪倉">大溪倉</option>
        <option value="大肚倉">大肚倉</option>
        <option value="岡山倉">岡山倉</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal('edit-modal')">取消</button>
      <button class="btn btn-primary"   onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<!-- 進貨／出貨 Modal -->
<div class="modal-overlay" id="stock-modal">
  <div class="modal">
    <h3 id="stock-modal-title">進貨</h3>
    <p id="stock-modal-info" style="font-size:0.9rem;color:#718096;margin-bottom:16px"></p>
    <div class="form-group">
      <label for="stock-qty">數量</label>
      <input type="number" id="stock-qty" min="1" placeholder="請輸入數量">
    </div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal('stock-modal')">取消</button>
      <button class="btn btn-primary"   onclick="saveStock()">確認</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'inventory_v1';

  let inventory = (function() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  })();

  function persist() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory)); }
    catch {}
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function badge(qty, min) {
    if (qty < min)       return '<span class="badge badge-danger">庫存不足</span>';
    if (qty >= min + 10) return '<span class="badge badge-excess">庫存過多</span>';
    return               '<span class="badge badge-ok">充足</span>';
  }

  function diffCell(qty, min) {
    const diff  = qty - min;
    const color = diff < 0 ? '#e53e3e' : diff >= 10 ? '#d69e2e' : '#276749';
    const sign  = diff > 0 ? '+' : '';
    return `<td style="font-weight:600;color:${color}">${sign}${diff}</td>`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── 警示區塊 ── */
  function renderAlert() {
    const low    = inventory.filter(d => d.qty < d.min);
    const box    = document.getElementById('alert-box');
    const tags   = document.getElementById('alert-tags');
    if (low.length === 0) { box.style.display = 'none'; return; }
    box.style.display = 'block';
    tags.innerHTML = low.map(d =>
      `<div class="alert-tag">${escHtml(d.name)}　目前 <span>${d.qty}</span> / 最低 <span>${d.min}</span></div>`
    ).join('');
  }

  /* ── 主表格 ── */
  function renderTable() {
    const query  = document.getElementById('search').value.trim().toLowerCase();
    const tbody  = document.getElementById('tbody');
    const empty  = document.getElementById('empty-msg');
    const stats  = document.getElementById('stats');

    const filtered = query
      ? inventory.filter(d => d.name.toLowerCase().includes(query))
      : inventory;

    stats.textContent = query
      ? `搜尋結果：${filtered.length} / ${inventory.length} 筆`
      : `共 ${inventory.length} 筆商品`;

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    tbody.innerHTML = filtered.map((item, i) => `
      <tr class="${item.qty < item.min ? 'row-low' : ''}">
        <td>${i + 1}</td>
        <td>${escHtml(item.name)}</td>
        <td>${escHtml(item.warehouse || '—')}</td>
        <td>${item.qty}</td>
        <td>${item.min}</td>
        ${diffCell(item.qty, item.min)}
        <td>${badge(item.qty, item.min)}</td>
        <td>
          <div class="action-btns">
            <button class="btn btn-in"     onclick="openStock('${item.id}','in')">進貨</button>
            <button class="btn btn-out"    onclick="openStock('${item.id}','out')">出貨</button>
            <button class="btn btn-edit"   onclick="editItem('${item.id}')">編輯</button>
            <button class="btn btn-danger" onclick="deleteItem('${item.id}')">刪除</button>
          </div>
        </td>
      </tr>`).join('');
  }

  function renderAll() {
    renderAlert();
    renderTable();
  }

  /* ── 新增商品 ── */
  function addItem() {
    const nameEl = document.getElementById('inp-name');
    const qtyEl  = document.getElementById('inp-qty');
    const minEl  = document.getElementById('inp-min');

    const name = nameEl.value.trim();
    const qty  = parseInt(qtyEl.value, 10);
    const min  = parseInt(minEl.value, 10);

    if (!name)             { alert('請輸入商品名稱'); nameEl.focus(); return; }
    if (isNaN(qty)||qty<0) { alert('請輸入有效的目前數量'); qtyEl.focus(); return; }
    if (isNaN(min)||min<0) { alert('請輸入有效的最低庫存量'); minEl.focus(); return; }

    const warehouse = document.getElementById('inp-warehouse').value;
    inventory.push({ id: Date.now().toString(), name, qty, min, warehouse });
    persist();
    nameEl.value = qtyEl.value = minEl.value = '';
    nameEl.focus();
    renderAll();
    showToast(`「${name}」已新增`);
  }

  /* ── 刪除 ── */
  function deleteItem(id) {
    const item = inventory.find(d => d.id === id);
    if (!item) return;
    inventory = inventory.filter(d => d.id !== id);
    persist();
    renderAll();
    showToast(`「${item.name}」已刪除`);
  }

  /* ── 編輯 Modal ── */
  let editingId = null;

  function editItem(id) {
    const item = inventory.find(d => d.id === id);
    if (!item) return;
    editingId = id;
    document.getElementById('edit-name').value      = item.name;
    document.getElementById('edit-qty').value       = item.qty;
    document.getElementById('edit-min').value       = item.min;
    document.getElementById('edit-warehouse').value = item.warehouse || '大溪倉';
    document.getElementById('edit-modal').classList.add('open');
    document.getElementById('edit-name').focus();
  }

  function saveEdit() {
    const name = document.getElementById('edit-name').value.trim();
    const qty  = parseInt(document.getElementById('edit-qty').value, 10);
    const min  = parseInt(document.getElementById('edit-min').value, 10);

    if (!name)             { document.getElementById('edit-name').focus(); return; }
    if (isNaN(qty)||qty<0) { document.getElementById('edit-qty').focus();  return; }
    if (isNaN(min)||min<0) { document.getElementById('edit-min').focus();  return; }

    const item = inventory.find(d => d.id === editingId);
    const warehouse = document.getElementById('edit-warehouse').value;
    if (item) { item.name = name; item.qty = qty; item.min = min; item.warehouse = warehouse; }
    persist();
    closeModal('edit-modal');
    renderAll();
    showToast(`「${name}」已更新`);
  }

  /* ── 進貨／出貨 Modal ── */
  let stockId   = null;
  let stockMode = null; // 'in' | 'out'

  function openStock(id, mode) {
    const item = inventory.find(d => d.id === id);
    if (!item) return;
    stockId   = id;
    stockMode = mode;
    document.getElementById('stock-modal-title').textContent = mode === 'in' ? '進貨' : '出貨';
    document.getElementById('stock-modal-info').textContent  =
      `${item.name}　目前庫存：${item.qty}`;
    document.getElementById('stock-qty').value = '';
    document.getElementById('stock-modal').classList.add('open');
    document.getElementById('stock-qty').focus();
  }

  function saveStock() {
    const n = parseInt(document.getElementById('stock-qty').value, 10);
    if (isNaN(n) || n <= 0) { document.getElementById('stock-qty').focus(); return; }

    const item = inventory.find(d => d.id === stockId);
    if (!item) return;

    if (stockMode === 'in') {
      item.qty += n;
      showToast(`「${item.name}」進貨 ${n}，現有 ${item.qty}`);
    } else {
      if (n > item.qty) { alert(`出貨量（${n}）超過目前庫存（${item.qty}）`); return; }
      item.qty -= n;
      showToast(`「${item.name}」出貨 ${n}，現有 ${item.qty}`);
    }
    persist();
    closeModal('stock-modal');
    renderAll();
  }

  /* ── 通用關 Modal ── */
  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
    if (id === 'edit-modal') editingId = null;
    if (id === 'stock-modal') { stockId = null; stockMode = null; }
  }

  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal('edit-modal');
  });
  document.getElementById('stock-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal('stock-modal');
  });

  /* ── 匯出 CSV ── */
  function exportCSV() {
    if (inventory.length === 0) { showToast('沒有資料可匯出'); return; }
    const BOM = '\uFEFF';
    const header = '商品名稱,倉別,目前數量,最低庫存量,差異數量,狀態';
    const rows = inventory.map(d => {
      const diff = d.qty - d.min;
      const sign = diff > 0 ? '+' : '';
      const status = d.qty < d.min ? '庫存不足' : d.qty >= d.min + 10 ? '庫存過多' : '充足';
      return `"${d.name.replace(/"/g,'""')}","${(d.warehouse||'').replace(/"/g,'""')}",${d.qty},${d.min},${sign}${diff},${status}`;
    });
    const csv  = BOM + [header, ...rows].join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `庫存列表_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV 已匯出');
  }

  /* ── Enter 快速新增 ── */
  ['inp-name','inp-qty','inp-min'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });
  });
  document.getElementById('stock-qty').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveStock();
  });

  renderAll();
</script>
</body>
</html>
